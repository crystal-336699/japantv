name: 일본 TV 채널 자동 업데이트

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  update-channels:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 채널 체크 및 HTML 업데이트
        run: python update_channels.py

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "채널 자동 업데이트 $(date +'%Y-%m-%d')"
          git push --force origin main
