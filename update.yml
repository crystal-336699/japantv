name: 일본 TV 채널 자동 업데이트

on:
  schedule:
    # 매 6시간마다 실행 (UTC 0,6,12,18시)
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update-channels:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 채널 업데이트 (복수 소스)
        run: python update_channels.py

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html channels.json
          git diff --staged --quiet || git commit -m "채널 자동 업데이트 $(date +'%Y-%m-%d %H:%M')"
          git push --force origin main
